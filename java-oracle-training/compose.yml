services:
  oracle:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-free
    environment:
      ORACLE_PWD: ${ORACLE_PASSWORD}
      ORACLE_CHARACTERSET: AL32UTF8 
      NLS_LANGUAGE: JAPANESE               # 言語：日本語
      NLS_TERRITORY: JAPAN                 # 地域：日本
      NLS_DATE_FORMAT: YYYY-MM-DD          # 日付フォーマット
      NLS_TIMESTAMP_FORMAT: YYYY-MM-DD HH24:MI:SS  # タイムスタンプフォーマット
      TZ: Asia/Tokyo                       # タイムゾーン：JST
      LANG: ja_JP.UTF-8
      NLS_LANG: JAPANESE_JAPAN.AL32UTF8

    ports:
      - "1521:1521"

    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./oracle/initdb:/opt/oracle/scripts/startup

    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10

  java:
    build:
      context: ./java
    container_name: java-training
    tty: true
    working_dir: /app
    volumes:
      - ./java:/app
    environment:
      TZ: Asia/Tokyo
    depends_on:
      oracle:
        condition: service_started

volumes:
  oracle-data:
